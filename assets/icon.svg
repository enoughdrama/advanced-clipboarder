<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Advanced Clipboarder">
  <!-- Rounded-square accent background (iOS/Windows 11 squircle-ish) -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="#7C5CFF"/>

  <!-- Clip mechanism (small bar + the rounded clamp shape) at the top -->
  <rect x="384" y="176" width="256" height="128" rx="40" ry="40" fill="#FFFFFF"/>

  <!-- Clipboard body -->
  <rect x="200" y="280" width="624" height="584" rx="72" ry="72" fill="#FFFFFF"/>

  <!-- Content lines (short, medium, long — visual rhythm) -->
  <rect x="304" y="488" width="272" height="28" rx="14" ry="14" fill="#7C5CFF"/>
  <rect x="304" y="568" width="416" height="28" rx="14" ry="14" fill="#7C5CFF" opacity="0.55"/>
  <rect x="304" y="648" width="352" height="28" rx="14" ry="14" fill="#7C5CFF" opacity="0.35"/>
</svg>
